; ============================================================
; Xdebug Configuration
; ============================================================
; Toggle via .env: XDEBUG_ENABLED=true/false
; Setelah mengubah, restart PHP container:
;   docker compose restart php84
;
; VS Code setup: Install "PHP Debug" extension, lalu buat
; launch.json (lihat docs/PHP-GUIDE.md)
; ============================================================

; Xdebug hanya aktif jika XDEBUG_ENABLED=true di .env
; Jika false, extension ter-load tapi mode=off (no overhead)
[xdebug]
xdebug.mode = ${XDEBUG_ENABLED:+debug,develop}
xdebug.start_with_request = yes
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.discover_client_host = true
xdebug.log = /tmp/xdebug.log
xdebug.idekey = VSCODE

; ============================================================
; PHP Custom Configuration — Development Mode
; File: config/php/php.ini
; ============================================================

[PHP]
; ---- Error Reporting (Development) ----
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/log/php/error.log

; ---- Memory & Limits ----
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
max_input_vars = 5000

; ---- Upload ----
upload_max_filesize = 100M
post_max_size = 100M
max_file_uploads = 20

; ---- Timezone ----
date.timezone = Asia/Jakarta

; ---- Session (via Redis) ----
session.save_handler = redis
session.save_path = "tcp://redis:6379"
session.gc_maxlifetime = 7200

; ---- OPcache (Development Settings) ----
opcache.enable = 1
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000
; Revalidate setiap request (development — langsung lihat perubahan)
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1

; ---- Misc ----
expose_php = Off
allow_url_fopen = On
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; ---- Mail (via Mailpit) ----
; PHP mail() akan dikirim ke Mailpit SMTP
sendmail_path = "/usr/sbin/sendmail -t -i -S mailpit:1025"
